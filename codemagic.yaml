workflows:
  android-workflow:
    name: Android Workflow
    max_build_duration: 60
    scripts:
      - name: Unzip and setup
        script: |
          unzip "shah-auto-deals (1).zip" -d project
          cd project
          gradle wrapper
      - name: Build APK
        script: |
          cd project
          ./gradlew assembleDebug
    artifacts:
      - project/app/build/outputs/**/*.apk
